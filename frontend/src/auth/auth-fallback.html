<!doctype html>
<html>
  <head>
    <title>Wing Authentication</title>
    <script
      src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"
      type="text/javascript"
    ></script>
  </head>
  <body>
    <div id="message">Authenticating...</div>
    <script>
      Office.onReady(function () {
        // This page is loaded in the Dialog.
        // It should redirect to the Microsoft Login page if no token is present,
        // or process the token if redirected back.

        // For V1 MVP, we are simulating the flow or handling the callback.
        // In a real scenario, we would redirect to:
        // https://login.microsoftonline.com/common/oauth2/v2.0/authorize?...

        // Since we don't have a full backend OAuth flow set up for the Dialog (which requires a redirect URI),
        // we will simulate a successful login for "Personal" accounts by returning a mock token to the parent.
        // In production, this file would parse the hash parameters from the OAuth callback.

        setTimeout(() => {
          // Simulate success for personal account
          const mockToken = "wing_personal_dummy_token";
          Office.context.ui.messageParent(JSON.stringify({ status: "success", token: mockToken }));
        }, 2000);
      });
    </script>
  </body>
</html>
