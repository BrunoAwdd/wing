server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location / {
        try_files $uri =404;
    }

    # Office WebView must revalidate entrypoints after each deployment. The
    # referenced JS/WASM assets are content-hashed and remain cacheable below.
    location ~* ^/(?:taskpane|commands)\.html$ {
        try_files $uri =404;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /manifest.xml {
        try_files $uri =404;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location ~* \.(?:js|wasm|json|png)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
